<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Field Ready: CHS in Practice</title>
  <meta name="description" content="Field Ready: CHS in Practice — an interactive story-driven learning game based on the Core Humanitarian Standard (CHS) 2024. Play as humanitarian worker Alex and navigate real-world dilemmas across 9 CHS commitments in the fictional country of Verdania. ~12 min play." />
  <meta property="og:title" content="Field Ready: CHS in Practice" />
  <meta property="og:description" content="An interactive story-driven quiz game covering all 9 CHS commitments. Play as humanitarian worker Alex and navigate real-world dilemmas in Verdania. ~12 min play." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/illustrations/0-intro.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Field Ready: CHS in Practice" />
  <meta name="twitter:description" content="An interactive story-driven quiz game covering all 9 CHS commitments. Play as humanitarian worker Alex and navigate real-world dilemmas in Verdania. ~12 min play." />
  <meta name="twitter:image" content="assets/illustrations/0-intro.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== LOADING SCREEN ===== -->
  <div id="screen-loading" class="screen active">
    <div id="loading-content" style="text-align:center">
      <div class="loading-title">FIELD READY<br>LOADING</div>
      <div class="loading-dots">. . .</div>
    </div>
  </div>

  <!-- ===== MENU SCREEN ===== -->
  <div id="screen-menu" class="screen">
    <!-- Populated by game.js renderMenu() -->
  </div>

  <!-- ===== PROLOGUE SCREEN ===== -->
  <div id="screen-prologue" class="screen">
    <!-- Populated by game.js renderPrologue() -->
  </div>

  <!-- ===== CHAPTER SCREEN ===== -->
  <div id="screen-chapter" class="screen">
    <!-- Populated by game.js renderChapter() -->
  </div>

  <!-- ===== FEEDBACK SCREEN ===== -->
  <div id="screen-feedback" class="screen">
    <!-- Populated by game.js renderFeedback() -->
  </div>

  <!-- ===== EPILOGUE SCREEN ===== -->
  <div id="screen-epilogue" class="screen">
    <!-- Populated by game.js renderEpilogue() -->
  </div>

  <script src="game.js"></script>
</body>
</html>
